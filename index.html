<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="saywhen: browser timers that speak up. Multiple drift-free timers with text-to-speech alerts.">
<title>saywhen · timers that speak up</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱</text></svg>">
<style>
  :root {
    --bg: oklch(0.12 0 0);
    --surface: oklch(0.17 0.01 210);
    --surface-2: oklch(0.21 0.012 210);
    --border: oklch(0.30 0.012 210);
    --ink: oklch(0.94 0.005 210);
    --muted: oklch(0.70 0.02 210);
    --primary: oklch(0.65 0.10 200);
    --primary-hover: oklch(0.70 0.11 200);
    --primary-dim: oklch(0.40 0.06 200);
    --accent: oklch(0.80 0.14 75);
    --danger: oklch(0.62 0.16 25);
    --led: oklch(0.84 0.16 150);
    --led-glow: oklch(0.84 0.16 150 / 0.35);
    --green: oklch(0.60 0.13 155);
    --green-hover: oklch(0.66 0.14 155);
    --radius: 10px;
    --z-toast: 10;
    /* per-timer name hues, assigned cyclically */
    --hue-0: oklch(0.80 0.11 200);
    --hue-1: oklch(0.78 0.13 300);
    --hue-2: oklch(0.74 0.16 25);
    --hue-3: oklch(0.82 0.13 75);
    --hue-4: oklch(0.80 0.14 150);
    --hue-5: oklch(0.78 0.12 250);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  button, input, select { font: inherit; color: inherit; }

  :focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* ---------- Header ---------- */
  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 1rem 3rem; }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.75rem 1.5rem;
    padding: 2rem 0 1.25rem;
  }
  .brand { display: flex; flex-direction: column; gap: 0.05rem; flex: 1; min-width: 15rem; }
  .wordmark {
    margin: 0;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--muted);
  }
  .wordmark .dot { color: var(--primary); }
  .wordmark .tag { font-weight: 400; margin-left: 0.3rem; }
  .tag { margin: 0; color: var(--muted); font-size: 0.85rem; }

  .header-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  /* ---------- Buttons ---------- */
  .btn {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink);
    border-radius: var(--radius);
    padding: 0.5rem 1rem;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 150ms ease-out, border-color 150ms ease-out, transform 100ms ease-out;
  }
  .btn:hover { background: var(--surface-2); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn.primary {
    background: var(--primary);
    border-color: var(--primary);
    color: oklch(0.99 0 0);
  }
  .btn.primary:hover:not(:disabled) { background: var(--primary-hover); border-color: var(--primary-hover); }

  .icon-btn {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 6px;
    width: 2rem;
    height: 2rem;
    line-height: 1;
    font-size: 1rem;
    transition: color 150ms ease-out, background 150ms ease-out;
  }
  .icon-btn:hover { color: var(--danger); background: var(--surface-2); }

  /* ---------- Header icon buttons ---------- */
  .icon-act {
    width: 2.4rem;
    height: 2.4rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.45rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    transition: color 150ms ease-out, border-color 150ms ease-out, transform 100ms ease-out;
  }
  .icon-act svg { flex-shrink: 0; }
  .act-label { display: none; font-size: 0.85rem; font-weight: 600; white-space: nowrap; }
  .icon-act:hover { color: var(--ink); border-color: var(--primary-dim); }
  .icon-act.active { color: var(--primary); border-color: var(--primary-dim); }
  .icon-act.blocked { color: var(--danger); border-color: var(--danger); }

  /* ---------- Settings menu panel ---------- */
  .menu[hidden] { display: none; }
  .menu {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 0.9rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 1.75rem;
  }
  .menu-row { display: flex; align-items: center; gap: 0.75rem; }
  .menu-label {
    width: 5.5rem;
    flex-shrink: 0;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .menu select {
    flex: 1;
    min-width: 0;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.35rem 0.5rem;
  }
  .menu input[type="range"] { accent-color: var(--primary); flex: 1; }
  .menu input[type="checkbox"] { accent-color: var(--primary); width: 1rem; height: 1rem; }
  .menu output { font-variant-numeric: tabular-nums; color: var(--ink); min-width: 2.6em; }
  .menu-check { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--muted); cursor: pointer; }
  .speech-warn { color: var(--accent); font-size: 0.85rem; }

  /* ---------- Board title (the hero heading, lives in the header) ---------- */
  .board-title {
    display: block;
    width: 100%;
    max-width: 28rem;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 0.1rem 0.5rem;
    margin-left: -0.5rem;
    font-size: 1.55rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
    transition: border-color 150ms ease-out, background 150ms ease-out;
  }
  .board-title::placeholder { color: var(--muted); font-weight: 600; }
  .board-title:hover { border-color: var(--border); }
  .board-title:focus { border-color: var(--border); background: var(--bg); outline: none; }

  /* ---------- All-timers bar ---------- */
  .allbar[hidden] { display: none; }
  .allbar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin: -0.75rem 0 1.25rem;
  }
  .allbar-label {
    width: 100%;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .allbar .btn { flex: 1; }
  #startAllBtn {
    background: var(--green);
    border-color: var(--green);
    color: oklch(0.99 0 0);
    font-weight: 700;
  }
  #startAllBtn:hover:not(:disabled) { background: var(--green-hover); border-color: var(--green-hover); }

  /* ---------- Footer clock ---------- */
  .clockbar {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-top: 2.5rem;
    font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.9rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .clock-label {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .clockbar time { color: var(--ink); }
  .next-up::before { content: '· '; }

  /* ---------- Timer grid ---------- */
  .timers {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 1.25rem;
    align-items: start;
  }
  .timers:not(:has(.timer)) { display: block; }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 4rem 1rem;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }

  /* ---------- Timer card ---------- */
  .timer {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.1rem 1.1rem;
  }
  .timer[data-status="done"] { border-color: var(--accent); }

  .timer-top { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem; }
  .name {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 0.2rem 0.4rem;
    margin-left: -0.4rem;
    font-weight: 600;
    transition: border-color 150ms ease-out, background 150ms ease-out;
  }
  .name:hover { border-color: var(--border); }
  .name:focus { border-color: var(--border); background: var(--bg); outline: none; }

  .clock, .clock-input {
    display: block;
    width: 100%;
    font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
    margin: 0;
  }
  .clock {
    appearance: none;
    background: none;
    border: none;
    padding: 0;
    color: var(--led);
    cursor: text;
    text-align: left;
  }
  .clock .num { text-shadow: 0 0 16px var(--led-glow); }
  .clock:hover .num { color: var(--primary-hover); }
  .clock .unit {
    font-size: 1rem;
    font-weight: 600;
    color: var(--muted);
    margin-right: 0.4rem;
    text-shadow: none;
  }
  .clock .max {
    font-size: 1rem;
    font-weight: 600;
    color: var(--muted);
    margin-left: 0.2rem;
    letter-spacing: 0;
    text-shadow: none;
  }
  .clock-input[hidden] { display: none; }
  .clock-input {
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--primary);
    border-radius: 0;
    padding: 0;
    color: var(--led);
    outline: none;
  }
  .timer[data-status="paused"] .clock { color: var(--muted); }
  .timer[data-status="done"] .clock { color: var(--accent); }

  .bar {
    height: 4px;
    background: var(--surface-2);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 0.6rem;
  }
  .bar-fill {
    height: 100%;
    width: 100%;
    background: var(--primary);
    border-radius: 2px;
    transition: width 200ms linear;
  }
  .timer[data-status="done"] .bar-fill { background: var(--accent); }

  .meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 0.9rem;
  }
  .fires { font-variant-numeric: tabular-nums; }
  .timer[data-status="done"] .status-label { color: var(--accent); }
  .meta-right { display: flex; align-items: center; gap: 0.6rem; }
  .cycle-chip {
    background: none;
    border: none;
    padding: 0;
    font: inherit;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline dotted;
    text-underline-offset: 3px;
    transition: color 150ms ease-out;
  }
  .cycle-chip:hover { color: var(--ink); }
  .clock-input.cycle-edit { border-bottom-color: var(--accent); }

  .clock-wrap { flex: 1; min-width: 0; }
  .timer-main {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    margin: 0.4rem 0 0.6rem;
  }
  .actions { display: flex; flex-direction: column; gap: 0.4rem; flex-shrink: 0; }
  .actions .start {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.45rem;
    min-width: 7rem;
    background: var(--green);
    border-color: var(--green);
    color: oklch(0.99 0 0);
  }
  .actions .start:hover:not(:disabled) { background: var(--green-hover); border-color: var(--green-hover); }
  .actions .start svg[hidden] { display: none; }
  .config .test {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    width: fit-content;
    background: var(--accent);
    border-color: var(--accent);
    color: oklch(0.20 0.02 75);
    font-size: 0.82rem;
    padding: 0.4rem 0.8rem;
  }
  .config .test:hover:not(:disabled) { filter: brightness(1.08); }

  /* drag to reorder */
  .drag-handle {
    appearance: none;
    background: none;
    border: none;
    padding: 0;
    width: 1.4rem;
    height: 1.8rem;
    display: grid;
    place-items: center;
    margin-left: -0.3rem;
    color: var(--muted);
    opacity: 0.6;
    cursor: grab;
    touch-action: none;
    transition: opacity 150ms ease-out;
  }
  .drag-handle:hover { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }
  .timer.dragging {
    border-color: var(--primary);
    box-shadow: 0 18px 44px oklch(0 0 0 / 0.5), 0 4px 12px oklch(0 0 0 / 0.4);
    cursor: grabbing;
    will-change: transform;
  }
  .drop-slot {
    border: 1px dashed var(--primary-dim);
    border-radius: var(--radius);
    background: oklch(0.65 0.10 200 / 0.05);
  }

  /* repeat toggle (music-player style) */
  .icon-tgl {
    appearance: none;
    background: none;
    border: 1px solid transparent;
    border-radius: 6px;
    width: 1.9rem;
    height: 1.9rem;
    display: grid;
    place-items: center;
    padding: 0;
    color: var(--muted);
    cursor: pointer;
    transition: color 150ms ease-out, background 150ms ease-out;
  }
  .icon-tgl:hover { color: var(--ink); }
  .icon-tgl.on { color: var(--primary); background: var(--primary-dim); }

  /* small text actions under the status row */
  .subctl { display: flex; align-items: center; gap: 0.9rem; margin-top: 0.7rem; }
  .subctl .spacer { flex: 1; }
  .link {
    appearance: none;
    background: none;
    border: none;
    padding: 0;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: color 150ms ease-out;
  }
  .link:hover { color: var(--ink); }

  .config { display: none; }
  .timer.open .config { display: grid; grid-template-columns: minmax(0, 1fr); gap: 0.8rem; border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 0.8rem; }

  /* status dot + badges */
  .status-label::before { content: '● '; font-size: 0.7em; }
  .timer[data-status="running"] .status-label { color: var(--led); }
  .warn-badge {
    appearance: none;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    background: oklch(0.80 0.14 75 / 0.12);
    border: none;
    border-radius: 999px;
    padding: 0.12rem 0.55rem;
    font: inherit;
    font-size: 0.75rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
    cursor: pointer;
    transition: background 150ms ease-out;
  }
  .warn-badge:hover { background: oklch(0.80 0.14 75 / 0.22); }
  .timer.closing .warn-badge {
    color: var(--danger);
    background: oklch(0.62 0.16 25 / 0.15);
  }

  /* two-tap delete: first tap arms, second confirms */
  .icon-btn.armed {
    width: auto;
    padding: 0 0.55rem;
    color: var(--danger);
    background: var(--surface-2);
    font-size: 0.78rem;
    font-weight: 700;
  }

  /* per-timer name hues */
  .timer.hue-0 .name { color: var(--hue-0); }
  .timer.hue-1 .name { color: var(--hue-1); }
  .timer.hue-2 .name { color: var(--hue-2); }
  .timer.hue-3 .name { color: var(--hue-3); }
  .timer.hue-4 .name { color: var(--hue-4); }
  .timer.hue-5 .name { color: var(--hue-5); }

  .duration-row { display: flex; align-items: center; gap: 0.6rem 1rem; flex-wrap: wrap; }

  .presets, .adders { display: flex; gap: 0.35rem; flex-wrap: wrap; }
  .adders .preset { color: var(--primary); border-color: var(--primary-dim); }
  .adders .preset:hover:not(:disabled) { color: var(--ink); border-color: var(--primary); }
  .preset {
    appearance: none;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 6px;
    padding: 0.3rem 0.55rem;
    font-size: 0.78rem;
    cursor: pointer;
    transition: color 150ms ease-out, border-color 150ms ease-out;
  }
  .preset:hover:not(:disabled) { color: var(--ink); border-color: var(--primary-dim); }
  .preset:disabled { opacity: 0.45; cursor: not-allowed; }

  .warn-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .warn-check { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
  .warn-row input[type="checkbox"] { accent-color: var(--primary); width: 1rem; height: 1rem; }
  .warn-sec {
    width: 3.2rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.25rem 0.4rem;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .warn-hint { flex-basis: 100%; color: var(--muted); opacity: 0.75; font-size: 0.75rem; }

  /* final-stretch state: inside the warning threshold */
  @keyframes closingPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .timer.closing { border-color: var(--danger); }
  .timer.closing .clock { color: var(--danger); animation: closingPulse 1s ease-in-out infinite; }
  .timer.closing .bar-fill { background: var(--danger); }
  .timer.closing .status-label { color: var(--danger); }

  /* entrances, exits, press feedback */
  @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(-4px); } }
  @keyframes cardIn { from { opacity: 0; transform: translateY(10px) scale(0.98); } }
  @keyframes cardOut { to { opacity: 0; transform: scale(0.96); } }
  .menu:not([hidden]) { animation: fadeSlideIn 200ms cubic-bezier(0.22, 1, 0.36, 1); }
  .timer.open .config { animation: fadeSlideIn 200ms cubic-bezier(0.22, 1, 0.36, 1); }
  .timer.enter { animation: cardIn 240ms cubic-bezier(0.22, 1, 0.36, 1); }
  .timer.leaving { animation: cardOut 160ms ease-out forwards; pointer-events: none; }
  .btn:active:not(:disabled), .icon-act:active { transform: scale(0.97); }

  /* fire flash */
  @keyframes firePulse {
    0% { box-shadow: 0 0 0 0 oklch(0.80 0.14 75 / 0.55); }
    100% { box-shadow: 0 0 0 18px oklch(0.80 0.14 75 / 0); }
  }
  .timer.fired { animation: firePulse 900ms ease-out 2; }

  .pip-note {
    text-align: center;
    color: var(--muted);
    padding: 4rem 1.25rem;
    max-width: 1080px;
    margin: 0 auto;
  }
  .pip-note p { margin: 0 0 1rem; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  /* scale up from the mobile base */
  @media (min-width: 640px) {
    .wrap { padding: 0 1.25rem 4rem; }
    .icon-act { width: auto; padding: 0 0.8rem; }
    .act-label { display: inline; }
    .clock, .clock-input { font-size: 2.7rem; }
    .timer { padding: 1.1rem 1.25rem 1.25rem; }
    .menu select { max-width: 20rem; }
    .menu input[type="range"] { max-width: 14rem; }
    .allbar-label { width: auto; margin-right: 0.5rem; }
    .allbar .btn { flex: 0 0 auto; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <p class="wordmark">saywhen<span class="dot">.</span> <span class="tag">timers that speak up</span></p>
      <input class="board-title" id="boardTitle" type="text" maxlength="80"
             placeholder="Name this board…" aria-label="Board title">
    </div>
    <div class="header-actions">
      <button class="icon-act" id="menuBtn" type="button" title="Voice &amp; sound settings" aria-expanded="false" aria-label="Voice and sound settings">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
          <path d="M2 4h12M2 8h12M2 12h12"/>
          <circle cx="6" cy="4" r="1.7" fill="currentColor" stroke="none"/>
          <circle cx="10.5" cy="8" r="1.7" fill="currentColor" stroke="none"/>
          <circle cx="5" cy="12" r="1.7" fill="currentColor" stroke="none"/>
        </svg>
        <span class="act-label">Settings</span>
      </button>
      <button class="icon-act" id="popoutBtn" type="button" title="Pop out: float above other windows" aria-label="Pop out to floating window">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9.5 1.5l5 5-3 .9-2.6 4.1-4.4-4.4 4.1-2.6z"/>
          <path d="M6 10l-4.5 4.5"/>
        </svg>
        <span class="act-label">Pop out</span>
      </button>
      <button class="icon-act" id="exportBtn" type="button" title="Export: save this board out to a JSON file" aria-label="Export board to file">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M8 10V2M5 5l3-3 3 3M2.5 13.5h11"/>
        </svg>
        <span class="act-label">Export</span>
      </button>
      <button class="icon-act" id="importBtn" type="button" title="Import: load a board in from a JSON file" aria-label="Import board from file">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M8 2v8M5 7l3 3 3-3M2.5 13.5h11"/>
        </svg>
        <span class="act-label">Import</span>
      </button>
      <input type="file" id="importFile" accept="application/json,.json" hidden>
      <button class="btn primary" id="addBtn" type="button">+ Add timer</button>
    </div>
  </header>

  <section class="menu" id="menuPanel" aria-label="Voice and sound settings" hidden>
    <div class="menu-row">
      <span class="menu-label">Voice</span>
      <select id="voiceSelect" aria-label="Speech voice"></select>
    </div>
    <div class="menu-row">
      <span class="menu-label">Rate</span>
      <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1">
      <output id="rateValue" for="rateSlider">1.0×</output>
    </div>
    <div class="menu-row">
      <span class="menu-label">Volume</span>
      <input type="range" id="volSlider" min="0" max="1" step="0.05" value="1">
      <output id="volValue" for="volSlider">100%</output>
    </div>
    <div class="menu-row">
      <span class="menu-label">Chime</span>
      <label class="menu-check"><input type="checkbox" id="chimeToggle" checked> before speaking</label>
    </div>
    <div class="menu-row">
      <span class="menu-label"></span>
      <button class="btn" id="testBtn" type="button">Test voice</button>
      <span class="speech-warn" id="speechWarn" hidden>Speech not supported in this browser</span>
    </div>
  </section>

  <section class="allbar" id="allBar" aria-label="Controls for all timers" hidden>
    <span class="allbar-label">All timers</span>
    <button class="btn" id="startAllBtn" type="button">Start all</button>
    <button class="btn" id="pauseAllBtn" type="button">Pause all</button>
    <button class="btn" id="resetAllBtn" type="button">Reset all</button>
  </section>

  <main class="timers" id="timers" aria-live="off"></main>
  <p class="empty" id="empty" hidden>No timers. Hit <strong>+ Add timer</strong> to create one.</p>

  <footer class="clockbar">
    <span class="clock-label">local</span>
    <time id="nowClock"></time>
    <span class="next-up" id="nextUp" hidden></span>
  </footer>
</div>

<div class="pip-note" id="pipNote" hidden>
  <p>saywhen is floating in a pop-out window.</p>
  <button class="btn" id="pipReturn" type="button">Bring it back</button>
</div>

<script>
(function () {
  'use strict';

  var STORAGE_KEY = 'saywhen:v1';
  var TICK_MS = 200;
  var MAX_MS = 359999000; // 99:59:59
  var PRESETS = [
    { label: '30s', ms: 30000 },
    { label: '1m',  ms: 60000 },
    { label: '5m',  ms: 300000 },
    { label: '10m', ms: 600000 }
  ];
  var ADDERS = [
    { label: '+10s', ms: 10000 },
    { label: '+30s', ms: 30000 },
    { label: '+1m',  ms: 60000 },
    { label: '+5m',  ms: 300000 }
  ];
  var speechOK = 'speechSynthesis' in window && 'SpeechSynthesisUtterance' in window;

  // ---------- state ----------

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function makeTimer(overrides) {
    var t = {
      id: uid(),
      name: 'Timer',
      mode: 'once',            // 'once' | 'loop'
      durationMs: 60000,
      remainingMs: 60000,
      status: 'idle',          // 'idle' | 'running' | 'paused' | 'done'
      fireCount: 0,
      warn: false,             // final-countdown warning enabled
      warnSec: 20,             // threshold in seconds: speak + flash + beep
      hue: 0                   // name color, cycles through 6 hues
    };
    if (overrides) for (var k in overrides) t[k] = overrides[k];
    return t;
  }

  function defaultState() {
    return {
      settings: { voiceURI: '', rate: 1, volume: 1, chime: true, boardTitle: '', menuOpen: true },
      timers: [makeTimer()]
    };
  }

  function sanitize(raw) {
    if (!raw || typeof raw !== 'object' || !Array.isArray(raw.timers)) return null;
    var s = raw.settings && typeof raw.settings === 'object' ? raw.settings : {};
    var state = {
      settings: {
        voiceURI: typeof s.voiceURI === 'string' ? s.voiceURI : '',
        rate: clampNum(s.rate, 0.5, 2, 1),
        volume: clampNum(s.volume, 0, 1, 1),
        chime: s.chime !== false,
        boardTitle: typeof s.boardTitle === 'string' ? s.boardTitle.slice(0, 80) : '',
        menuOpen: typeof s.menuOpen === 'boolean' ? s.menuOpen : false
      },
      timers: []
    };
    raw.timers.forEach(function (rt, idx) {
      if (!rt || typeof rt !== 'object') return;
      var dur = clampNum(rt.durationMs, 0, MAX_MS, 60000);
      var status = rt.status === 'paused' || rt.status === 'done' ? rt.status : 'idle';
      // never auto-resume: anything that was running comes back paused
      if (rt.status === 'running') status = 'paused';
      // remaining may exceed duration when time was added mid-run
      var rem = clampNum(rt.remainingMs, 0, MAX_MS, dur);
      if (status === 'idle') rem = dur;
      if (status === 'done') rem = 0;
      if (status === 'paused' && rem <= 0) { status = 'idle'; rem = dur; }
      state.timers.push(makeTimer({
        id: typeof rt.id === 'string' && rt.id ? rt.id : uid(),
        name: typeof rt.name === 'string' ? rt.name.slice(0, 80) : 'Timer',
        mode: rt.mode === 'loop' ? 'loop' : 'once',
        durationMs: dur,
        remainingMs: rem,
        status: status,
        fireCount: clampNum(rt.fireCount, 0, 1e9, 0),
        warn: rt.warn === true,
        warnSec: clampNum(rt.warnSec, 1, 3600, 20),
        hue: clampNum(rt.hue, 0, 5, idx % 6)
      }));
    });
    return state;
  }

  function clampNum(v, min, max, fallback) {
    v = Number(v);
    if (!isFinite(v)) return fallback;
    return Math.min(max, Math.max(min, v));
  }

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      return sanitize(JSON.parse(raw)) || defaultState();
    } catch (e) {
      return defaultState();
    }
  }

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(serialize()));
    } catch (e) { /* storage unavailable: run in-memory only */ }
  }

  // Serialize with running timers frozen as paused at their current remaining.
  function serialize() {
    return {
      settings: state.settings,
      timers: state.timers.map(function (t) {
        var copy = {};
        for (var k in t) copy[k] = t[k];
        if (t.status === 'running') {
          var rt = runtime[t.id];
          copy.status = 'paused';
          copy.remainingMs = rt ? Math.max(0, rt.endTime - Date.now()) : t.remainingMs;
        }
        return copy;
      })
    };
  }

  var state = load();
  var runtime = {};   // id -> { endTime }
  var els = {};       // id -> element refs

  // ---------- audio ----------

  var audioCtx = null;
  function ensureAudio() {
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      if (!audioCtx) audioCtx = new AC();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch (e) { /* no audio */ }
  }

  function chime() {
    if (!audioCtx || state.settings.volume <= 0) return;
    try {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      var now = audioCtx.currentTime;
      var peak = 0.25 * state.settings.volume;
      [880, 1320].forEach(function (freq, i) {
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        var t0 = now + i * 0.14;
        gain.gain.setValueAtTime(0.0001, t0);
        gain.gain.exponentialRampToValueAtTime(peak, t0 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.13);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(t0);
        osc.stop(t0 + 0.15);
      });
    } catch (e) { /* ignore */ }
  }

  // short tick used in the final stretch; pitch rises as closeness -> 1
  function beepTick(closeness) {
    if (!audioCtx || state.settings.volume <= 0) return;
    try {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      var t0 = audioCtx.currentTime;
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 700 + 500 * Math.max(0, Math.min(1, closeness));
      var peak = 0.12 * state.settings.volume;
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(peak, t0 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.09);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t0);
      osc.stop(t0 + 0.1);
    } catch (e) { /* ignore */ }
  }

  // ---------- speech ----------

  var voices = [];

  function refreshVoices() {
    if (!speechOK) return;
    voices = speechSynthesis.getVoices().slice();
    voices.sort(function (a, b) {
      if (a.default !== b.default) return a.default ? -1 : 1;
      if (a.localService !== b.localService) return a.localService ? -1 : 1;
      return a.name.localeCompare(b.name);
    });
    var sel = document.getElementById('voiceSelect');
    sel.innerHTML = '';
    var def = document.createElement('option');
    def.value = '';
    def.textContent = voices.length ? 'System default' : 'No voices available';
    sel.appendChild(def);
    voices.forEach(function (v) {
      var opt = document.createElement('option');
      opt.value = v.voiceURI;
      opt.textContent = v.name + ' (' + v.lang + ')';
      sel.appendChild(opt);
    });
    sel.value = state.settings.voiceURI;
    if (sel.value !== state.settings.voiceURI) sel.value = '';
  }

  function speak(text) {
    if (!speechOK || !text) return;
    try {
      var u = new SpeechSynthesisUtterance(text);
      for (var i = 0; i < voices.length; i++) {
        if (voices[i].voiceURI === state.settings.voiceURI) { u.voice = voices[i]; break; }
      }
      u.rate = state.settings.rate;
      u.volume = state.settings.volume;
      speechSynthesis.speak(u);
    } catch (e) { /* ignore */ }
  }

  function announce(text) {
    if (state.settings.volume <= 0) return; // muted
    if (state.settings.chime) {
      chime();
      setTimeout(function () { speak(text); }, 300);
    } else {
      speak(text);
    }
  }

  // ---------- time formatting ----------

  function pad2(n) { return n < 10 ? '0' + n : '' + n; }

  function fmt(ms) {
    var total = Math.ceil(Math.max(0, ms) / 1000);
    var h = Math.floor(total / 3600);
    var m = Math.floor((total % 3600) / 60);
    var s = total % 60;
    return h > 0 ? h + ':' + pad2(m) + ':' + pad2(s) : m + ':' + pad2(s);
  }

  // compact form for captions: 60m / 1h 05m / 45s
  function fmtShort(ms) {
    var total = Math.round(Math.max(0, ms) / 1000);
    var h = Math.floor(total / 3600);
    var m = Math.floor((total % 3600) / 60);
    var s = total % 60;
    var out = [];
    if (h) out.push(h + 'h');
    if (m) out.push(m + 'm');
    if (s || !out.length) out.push(s + 's');
    return out.join(' ');
  }

  // big display with unit labels: 1h 02m 30s / 7m 23s / 45s.
  // maxMs (optional) renders a "/ 60m" cycle caption after the digits.
  function renderClock(el, ms, maxMs) {
    var total = Math.ceil(Math.max(0, ms) / 1000);
    var h = Math.floor(total / 3600);
    var m = Math.floor((total % 3600) / 60);
    var s = total % 60;
    var parts = h > 0 ? [[h, 'h'], [pad2(m), 'm'], [pad2(s), 's']]
              : m > 0 ? [[m, 'm'], [pad2(s), 's']]
              : [[s, 's']];
    var html = parts.map(function (p) {
      return '<span class="num">' + p[0] + '</span><span class="unit">' + p[1] + '</span>';
    }).join('');
    if (maxMs != null) html += '<span class="max" title="Full cycle length">/ ' + fmtShort(maxMs) + '</span>';
    el.innerHTML = html;
  }

  // accepts "7:30", "1:05:00", "730" (microwave: last two digits are seconds), "90" -> 1m 30s
  function parseClock(str) {
    str = String(str || '').trim();
    if (!str || /[^\d:.\s]/.test(str)) return null;
    var parts = str.split(/[:.\s]+/).filter(function (p) { return p.length; });
    if (!parts.length || parts.length > 3) return null;
    var secs = 0;
    if (parts.length === 1) {
      var d = parts[0];
      secs = Number(d.slice(0, -4) || 0) * 3600 + Number(d.slice(-4, -2) || 0) * 60 + Number(d.slice(-2));
    } else {
      for (var i = 0; i < parts.length; i++) secs = secs * 60 + Number(parts[i]);
    }
    if (!isFinite(secs)) return null;
    return Math.max(0, Math.min(secs * 1000, MAX_MS));
  }

  // FLIP: animate cards from their old grid positions to their new ones
  function flipMove(mutate) {
    var cards = Array.prototype.filter.call(
      document.querySelectorAll('#timers .timer'),
      function (c) { return !c.classList.contains('dragging'); }
    );
    var before = cards.map(function (c) { return c.getBoundingClientRect(); });
    mutate();
    cards.forEach(function (c, i) {
      var after = c.getBoundingClientRect();
      var dx = before[i].left - after.left;
      var dy = before[i].top - after.top;
      if (!dx && !dy) return;
      c.style.transition = 'none';
      c.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
      requestAnimationFrame(function () {
        c.style.transition = 'transform 220ms cubic-bezier(0.22, 1, 0.36, 1)';
        c.style.transform = '';
        setTimeout(function () { c.style.transition = ''; }, 260);
      });
    });
  }

  // ---------- timer card DOM ----------

  function buildCard(t) {
    var card = document.createElement('article');
    card.className = 'timer hue-' + (t.hue || 0);
    card.dataset.id = t.id;

    card.innerHTML =
      '<div class="timer-top">' +
        '<button class="drag-handle" type="button" aria-label="Drag to reorder" title="Drag to reorder">' +
          '<svg viewBox="0 0 10 16" width="10" height="16" fill="currentColor" aria-hidden="true">' +
            '<circle cx="3" cy="3" r="1.3"/><circle cx="7" cy="3" r="1.3"/>' +
            '<circle cx="3" cy="8" r="1.3"/><circle cx="7" cy="8" r="1.3"/>' +
            '<circle cx="3" cy="13" r="1.3"/><circle cx="7" cy="13" r="1.3"/>' +
          '</svg>' +
        '</button>' +
        '<input class="name" aria-label="Timer name" maxlength="80">' +
        '<button class="icon-btn delete" type="button" aria-label="Delete timer">✕</button>' +
      '</div>' +
      '<div class="timer-main">' +
        '<div class="clock-wrap">' +
          '<button class="clock" type="button" title="Click to type a time"></button>' +
          '<input class="clock-input" inputmode="numeric" aria-label="Type a time, like 7:30 or 730" hidden>' +
        '</div>' +
        '<div class="actions">' +
          '<button class="btn start" type="button">' +
            '<svg class="ic-play" viewBox="0 0 16 16" width="13" height="13" fill="currentColor" aria-hidden="true"><path d="M4.5 2.5v11l9-5.5z"/></svg>' +
            '<svg class="ic-pause" viewBox="0 0 16 16" width="13" height="13" fill="currentColor" aria-hidden="true" hidden><path d="M4.5 3h2.6v10H4.5zM8.9 3h2.6v10H8.9z"/></svg>' +
            '<span class="start-label">Start</span>' +
          '</button>' +
        '</div>' +
      '</div>' +
      '<div class="bar" aria-hidden="true"><div class="bar-fill"></div></div>' +
      '<div class="meta"><span class="status-label"></span><span class="meta-right">' +
        '<button class="warn-badge" type="button" title="Edit the warning threshold" hidden>' +
          '<svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
            '<path d="M12 5.5a4 4 0 00-8 0c0 4-1.7 5-1.7 5h11.4s-1.7-1-1.7-5"/>' +
            '<path d="M9.2 13.2a1.4 1.4 0 01-2.4 0"/>' +
          '</svg>' +
          '<span class="warn-badge-txt"></span>' +
        '</button>' +
        '<button class="cycle-chip" type="button" title="Click to set the cycle length"></button>' +
        '<span class="fires" hidden></span>' +
      '</span></div>' +
      '<div class="subctl">' +
        '<button class="link resync" type="button" title="Set where the countdown is right now">Resync</button>' +
        '<button class="link reset" type="button">Reset</button>' +
        '<button class="link duplicate" type="button" title="Clone this timer, settings and all">Duplicate</button>' +
        '<span class="spacer"></span>' +
        '<button class="icon-tgl repeat-btn" type="button" aria-pressed="false" title="Repeat: re-arm and go again at zero">' +
          '<svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
            '<path d="M11 1.5L13.5 4L11 6.5"/>' +
            '<path d="M2.5 8V6.5a2.5 2.5 0 012.5-2.5h8"/>' +
            '<path d="M5 14.5L2.5 12L5 9.5"/>' +
            '<path d="M13.5 8v1.5a2.5 2.5 0 01-2.5 2.5h-8"/>' +
          '</svg>' +
        '</button>' +
        '<button class="link cfg" type="button" aria-expanded="false">settings ▾</button>' +
      '</div>' +
      '<div class="config">' +
        '<div class="duration-row">' +
          '<div class="presets" role="group" aria-label="Set duration"></div>' +
          '<div class="adders" role="group" aria-label="Add time"></div>' +
        '</div>' +
        '<div class="warn-row">' +
          '<label class="warn-check"><input class="warn-input" type="checkbox"> warn at</label>' +
          '<input class="warn-sec" type="text" inputmode="numeric" maxlength="4" aria-label="Warning threshold in seconds">' +
          '<span class="warn-tail">sec left</span>' +
          '<span class="warn-hint">speaks, flashes red, beeps near zero</span>' +
        '</div>' +
        '<button class="btn test" type="button" title="Preview this alert now: chime + spoken name. Does not affect the countdown.">' +
          '<svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
            '<path d="M7.5 3.5L4.5 6H2v4h2.5l3 2.5z" fill="currentColor" stroke="none"/>' +
            '<path d="M10 5.5a3.5 3.5 0 010 5M12 3.5a6 6 0 010 9"/>' +
          '</svg>' +
          'Test alert' +
        '</button>' +
      '</div>';

    var ref = {
      card: card,
      name: card.querySelector('.name'),
      clock: card.querySelector('.clock'),
      clockInput: card.querySelector('.clock-input'),
      barFill: card.querySelector('.bar-fill'),
      statusLabel: card.querySelector('.status-label'),
      cycleChip: card.querySelector('.cycle-chip'),
      warnBadge: card.querySelector('.warn-badge'),
      warnBadgeTxt: card.querySelector('.warn-badge-txt'),
      fires: card.querySelector('.fires'),
      startBtn: card.querySelector('.start'),
      testBtn: card.querySelector('.test'),
      resyncBtn: card.querySelector('.resync'),
      resetBtn: card.querySelector('.reset'),
      cfgBtn: card.querySelector('.cfg'),
      presets: card.querySelector('.presets'),
      adders: card.querySelector('.adders'),
      repeatBtn: card.querySelector('.repeat-btn'),
      dragHandle: card.querySelector('.drag-handle'),
      warnInput: card.querySelector('.warn-input'),
      warnSec: card.querySelector('.warn-sec')
    };
    els[t.id] = ref;

    ref.name.value = t.name;
    ref.warnInput.checked = t.warn;
    ref.warnSec.value = t.warnSec;

    PRESETS.forEach(function (p) {
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'preset';
      b.textContent = p.label;
      b.addEventListener('click', function () {
        if (t.status === 'running') return;
        setDuration(t, p.ms);
      });
      ref.presets.appendChild(b);
    });

    ADDERS.forEach(function (a) {
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'preset';
      b.textContent = a.label;
      b.setAttribute('aria-label', 'Add ' + a.label.slice(1));
      b.addEventListener('click', function () { addTime(t, a.ms); });
      ref.adders.appendChild(b);
    });

    // events
    ref.name.addEventListener('change', function () {
      t.name = ref.name.value.trim() || 'Timer';
      ref.name.value = t.name;
      save();
    });
    // two-tap delete: ✕ arms to "Sure?", second tap within 2.5s confirms
    var delBtn = card.querySelector('.delete');
    var delArm = null;
    delBtn.addEventListener('click', function () {
      if (!delBtn.classList.contains('armed')) {
        delBtn.classList.add('armed');
        delBtn.textContent = 'Sure?';
        delArm = setTimeout(function () {
          delBtn.classList.remove('armed');
          delBtn.textContent = '✕';
        }, 2500);
        return;
      }
      clearTimeout(delArm);
      ref.card.classList.add('leaving');
      setTimeout(function () {
        flipMove(function () { removeTimer(t.id); }); // neighbors close the gap smoothly
      }, 170);
    });
    delBtn.addEventListener('blur', function () {
      clearTimeout(delArm);
      delBtn.classList.remove('armed');
      delBtn.textContent = '✕';
    });

    card.querySelector('.duplicate').addEventListener('click', function () {
      duplicateTimer(t);
    });
    ref.warnBadge.addEventListener('click', function () {
      if (!card.classList.contains('open')) ref.cfgBtn.click();
      ref.warnSec.focus();
      ref.warnSec.select();
    });
    ref.startBtn.addEventListener('click', function () { toggleStart(t); });
    ref.testBtn.addEventListener('click', function () {
      ensureAudio();
      announce(t.name);
      // visible feedback even with sound off
      ref.card.classList.remove('fired');
      void ref.card.offsetWidth;
      ref.card.classList.add('fired');
    });
    ref.resetBtn.addEventListener('click', function () { resetTimer(t); });
    ref.cfgBtn.addEventListener('click', function () {
      var open = card.classList.toggle('open');
      ref.cfgBtn.textContent = open ? 'settings ▴' : 'settings ▾';
      ref.cfgBtn.setAttribute('aria-expanded', open);
    });

    // The clock editor has two explicit modes:
    //   'current': set where the countdown is right now (cycle untouched)
    //   'cycle': set the full cycle length (live countdown untouched)
    function openClockEdit(mode) {
      ref.editing = true;
      ref.editMode = mode;
      ref.clock.hidden = true;
      ref.clockInput.hidden = false;
      ref.clockInput.classList.toggle('cycle-edit', mode === 'cycle');
      var rt = runtime[t.id];
      ref.clockInput.value = fmt(
        mode === 'cycle' ? t.durationMs
        : t.status === 'running' && rt ? Math.max(0, rt.endTime - Date.now())
        : t.remainingMs
      );
      ref.clockInput.focus();
      ref.clockInput.select();
    }
    function closeClockEdit(commit, refocus) {
      if (!ref.editing) return;
      ref.editing = false;
      ref.clockInput.hidden = true;
      ref.clock.hidden = false;
      if (commit) {
        var ms = parseClock(ref.clockInput.value);
        if (ms !== null) {
          if (ref.editMode === 'cycle') {
            if (t.status === 'running' || t.status === 'paused') {
              t.durationMs = ms; // live countdown keeps going; next re-arm uses this
              save();
            } else {
              setDuration(t, ms);
            }
          } else { // current
            if (t.status === 'running') {
              var rt = runtime[t.id];
              if (rt) rt.endTime = Date.now() + ms;
            } else if (t.status === 'done' && ms > 0) {
              t.status = 'paused'; // resynced a finished timer: ready to resume
            }
            t.remainingMs = ms;
            save();
          }
        }
      }
      updateCard(t);
      if (refocus) ref.clock.focus();
    }
    // clicking the big clock: live timers edit the current round, fresh ones the cycle
    ref.clock.addEventListener('click', function () {
      openClockEdit(t.status === 'running' || t.status === 'paused' ? 'current' : 'cycle');
    });
    ref.resyncBtn.addEventListener('click', function () { openClockEdit('current'); });
    ref.cycleChip.addEventListener('click', function () { openClockEdit('cycle'); });
    ref.clockInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); closeClockEdit(true, true); }
      else if (e.key === 'Escape') { closeClockEdit(false, true); }
    });
    ref.clockInput.addEventListener('blur', function () {
      closeClockEdit(true, false); // click-away commits
    });
    ref.repeatBtn.addEventListener('click', function () {
      t.mode = t.mode === 'loop' ? 'once' : 'loop';
      if (t.mode === 'once') t.fireCount = 0;
      save();
      updateCard(t);
    });

    // drag to reorder: the card lifts and follows the pointer while a
    // dashed slot glides through the grid (FLIP-animated neighbors)
    ref.dragHandle.addEventListener('pointerdown', function (e) {
      e.preventDefault();
      try { ref.dragHandle.setPointerCapture(e.pointerId); } catch (err) { /* synthetic pointer */ }
      var card = ref.card;
      var mount = document.getElementById('timers');
      var startX = e.clientX, startY = e.clientY;
      var rect = null;
      var placeholder = null;
      var started = false;
      var finished = false;

      function begin() {
        started = true;
        rect = card.getBoundingClientRect();
        placeholder = document.createElement('div');
        placeholder.className = 'drop-slot';
        placeholder.style.height = rect.height + 'px';
        mount.insertBefore(placeholder, card);
        card.classList.add('dragging');
        card.style.position = 'fixed';
        card.style.left = rect.left + 'px';
        card.style.top = rect.top + 'px';
        card.style.width = rect.width + 'px';
        card.style.zIndex = '10';
        card.style.pointerEvents = 'none';
      }

      function onMove(ev) {
        if (!started) {
          // small threshold so a plain click doesn't lift the card
          if (Math.abs(ev.clientX - startX) + Math.abs(ev.clientY - startY) < 5) return;
          begin();
        }
        card.style.transform = 'translate(' + (ev.clientX - startX) + 'px,' + (ev.clientY - startY) + 'px) scale(1.02)';
        var el = document.elementFromPoint(ev.clientX, ev.clientY);
        var over = el && el.closest ? el.closest('#timers .timer') : null;
        if (over && over !== card) {
          var r2 = over.getBoundingClientRect();
          var target = (ev.clientY - r2.top) < r2.height / 2 ? over : over.nextElementSibling;
          if (target !== placeholder) {
            flipMove(function () { mount.insertBefore(placeholder, target); });
          }
        }
      }

      function settle() {
        if (finished) return;
        finished = true;
        card.classList.remove('dragging');
        card.style.cssText = '';
        mount.insertBefore(card, placeholder);
        placeholder.remove();
        var order = Array.prototype.map.call(mount.querySelectorAll('.timer'), function (c) { return c.dataset.id; });
        state.timers.sort(function (a, b) { return order.indexOf(a.id) - order.indexOf(b.id); });
        save();
      }

      function onUp() {
        ref.dragHandle.removeEventListener('pointermove', onMove);
        ref.dragHandle.removeEventListener('pointerup', onUp);
        ref.dragHandle.removeEventListener('pointercancel', onUp);
        if (!started) return;
        // glide into the open slot, then snap the DOM into place
        var pr = placeholder.getBoundingClientRect();
        card.style.transition = 'transform 180ms cubic-bezier(0.22, 1, 0.36, 1)';
        card.style.transform = 'translate(' + (pr.left - rect.left) + 'px,' + (pr.top - rect.top) + 'px)';
        card.addEventListener('transitionend', settle, { once: true });
        setTimeout(settle, 230); // fallback: reduced-motion kills transitions
      }

      ref.dragHandle.addEventListener('pointermove', onMove);
      ref.dragHandle.addEventListener('pointerup', onUp);
      ref.dragHandle.addEventListener('pointercancel', onUp);
    });
    ref.warnInput.addEventListener('change', function () {
      t.warn = ref.warnInput.checked;
      save();
      updateCard(t);
    });
    ref.warnSec.addEventListener('change', function () {
      var v = clampNum(parseInt(ref.warnSec.value, 10), 1, 3600, 20);
      ref.warnSec.value = v;
      t.warnSec = v;
      save();
      updateCard(t);
    });

    return card;
  }

  function setDuration(t, ms) {
    t.durationMs = ms;
    t.remainingMs = ms;
    if (t.status !== 'running') t.status = 'idle';
    save();
    updateCard(t);
  }

  // ---------- timer actions ----------

  // Microwave-style: extend a live countdown, or bump the set duration when idle.
  function addTime(t, ms) {
    if (t.status === 'running') {
      var rt = runtime[t.id];
      if (rt) rt.endTime = Math.min(rt.endTime + ms, Date.now() + MAX_MS);
    } else if (t.status === 'paused') {
      t.remainingMs = Math.min(t.remainingMs + ms, MAX_MS);
    } else { // idle or done: grow the configured duration
      setDuration(t, Math.min(t.durationMs + ms, MAX_MS));
      return;
    }
    save();
    updateCard(t);
  }

  function pauseTimer(t) {
    var rt = runtime[t.id];
    t.remainingMs = rt ? Math.max(0, rt.endTime - Date.now()) : t.remainingMs;
    delete runtime[t.id];
    t.status = 'paused';
  }

  function startTimer(t) {
    if (t.durationMs <= 0) return;
    if (t.status === 'done' || t.remainingMs <= 0) {
      t.remainingMs = t.durationMs;
      if (t.mode === 'once') t.fireCount = 0; // fresh run, fresh count
    }
    runtime[t.id] = { endTime: Date.now() + t.remainingMs };
    t.status = 'running';
  }

  function toggleStart(t) {
    if (t.status === 'running') {
      pauseTimer(t);
    } else {
      ensureAudio(); // user gesture: unlock audio for the eventual chime
      startTimer(t);
    }
    save();
    updateCard(t);
  }

  function resetTimer(t) {
    delete runtime[t.id];
    t.status = 'idle';
    t.remainingMs = t.durationMs;
    t.fireCount = 0;
    save();
    updateCard(t);
  }

  function duplicateTimer(t) {
    var copy = makeTimer({
      name: t.name + ' copy',
      mode: t.mode,
      durationMs: t.durationMs,
      remainingMs: t.durationMs,
      warn: t.warn,
      warnSec: t.warnSec,
      hue: state.timers.length % 6
    });
    var idx = state.timers.indexOf(t);
    state.timers.splice(idx + 1, 0, copy);
    var mount = document.getElementById('timers');
    var newCard = buildCard(copy);
    flipMove(function () {
      mount.insertBefore(newCard, els[t.id].card.nextElementSibling);
    });
    newCard.classList.add('enter');
    updateCard(copy);
    updateEmpty();
    save();
  }

  function removeTimer(id) {
    delete runtime[id];
    var ref = els[id];
    if (ref) ref.card.remove();
    delete els[id];
    state.timers = state.timers.filter(function (t) { return t.id !== id; });
    save();
    updateEmpty();
  }

  function fire(t) {
    announce(t.name);
    var ref = els[t.id];
    if (ref) {
      ref.card.classList.remove('fired');
      void ref.card.offsetWidth; // restart animation
      ref.card.classList.add('fired');
    }
  }

  // ---------- render ----------

  var STATUS_TEXT = { idle: 'Ready', running: 'Running', paused: 'Paused', done: 'Done' };

  function updateCard(t) {
    var ref = els[t.id];
    if (!ref) return;
    var running = t.status === 'running';
    var rem = running && runtime[t.id]
      ? Math.max(0, runtime[t.id].endTime - Date.now())
      : t.remainingMs;

    ref.card.dataset.status = t.status;
    // final stretch: inside the warning threshold while running
    var closing = t.warn && running && rem > 0 && rem <= t.warnSec * 1000;
    ref.card.classList.toggle('closing', closing);
    // show "/ cycle" whenever the countdown differs from the full duration
    renderClock(ref.clock, rem, rem !== t.durationMs ? t.durationMs : null);
    ref.clock.title = t.status === 'running' || t.status === 'paused'
      ? 'Click to resync this round (cycle stays ' + fmt(t.durationMs) + ')'
      : 'Click to type a time';
    ref.barFill.style.width = Math.min(100, t.durationMs > 0 ? (rem / t.durationMs) * 100 : 0) + '%';
    ref.statusLabel.textContent = closing ? 'Ending soon' : (STATUS_TEXT[t.status] || '');
    ref.startBtn.querySelector('.ic-play').hidden = running;
    ref.startBtn.querySelector('.ic-pause').hidden = !running;
    ref.startBtn.querySelector('.start-label').textContent =
      running ? 'Pause' : (t.status === 'paused' ? 'Resume' : 'Start');
    ref.startBtn.disabled = t.durationMs <= 0;

    var showFires = t.mode === 'loop' || (t.mode === 'once' && t.status === 'done');
    ref.cycleChip.hidden = t.mode !== 'loop';
    ref.cycleChip.textContent = 'cycle ' + fmtShort(t.durationMs);
    ref.warnBadge.hidden = !t.warn;
    ref.warnBadgeTxt.textContent = t.warnSec + 's';
    ref.fires.hidden = !(showFires && t.fireCount > 0);
    ref.fires.textContent = 'fired ×' + t.fireCount;
    var looping = t.mode === 'loop';
    ref.repeatBtn.classList.toggle('on', looping);
    ref.repeatBtn.setAttribute('aria-pressed', String(looping));

    ref.presets.querySelectorAll('.preset').forEach(function (b) { b.disabled = running; });
    updateAllBar();
  }

  function updateEmpty() {
    document.getElementById('empty').hidden = state.timers.length > 0;
    updateAllBar();
  }

  function updateAllBar() {
    if (!allBar) return;
    allBar.hidden = state.timers.length < 2;
    startAllBtn.disabled = !state.timers.some(function (t) { return t.status !== 'running' && t.durationMs > 0; });
    pauseAllBtn.disabled = !state.timers.some(function (t) { return t.status === 'running'; });
    resetAllBtn.disabled = !state.timers.some(function (t) {
      return t.status !== 'idle' || t.remainingMs !== t.durationMs || t.fireCount > 0;
    });
  }

  function renderAll() {
    var mount = document.getElementById('timers');
    mount.innerHTML = '';
    els = {};
    state.timers.forEach(function (t) {
      mount.appendChild(buildCard(t));
      updateCard(t);
    });
    updateEmpty();
  }

  // ---------- tick ----------

  // "20 seconds" / "2 minutes" for the spoken warning
  function speakableThreshold(sec) {
    if (sec >= 60 && sec % 60 === 0) {
      var m = sec / 60;
      return m + (m === 1 ? ' minute' : ' minutes');
    }
    return sec + ' seconds';
  }

  var nowClock = document.getElementById('nowClock');
  var nextUpEl = document.getElementById('nextUp');
  var lastDocTitle = '';

  function fmtWallClock(d) {
    var h = d.getHours();
    var ap = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return pad2(h) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds()) + ' ' + ap;
  }

  setInterval(function () {
    var now = Date.now();
    nowClock.textContent = fmtWallClock(new Date(now));
    state.timers.forEach(function (t) {
      if (t.status !== 'running') return;
      var rt = runtime[t.id];
      if (!rt) { t.status = 'paused'; updateCard(t); return; }
      var rem = rt.endTime - now;
      if (t.warn && rem > 500 && state.settings.volume > 0) {
        var thrMs = t.warnSec * 1000;
        // spoken reminder: fires once, when the countdown crosses the threshold
        var last = rt.lastRem != null ? rt.lastRem : rem;
        if (last > thrMs && rem <= thrMs) speak(speakableThreshold(t.warnSec) + ' until ' + t.name);
        // beeping in the final stretch (last 10s, or the whole threshold if shorter)
        var beepWin = Math.min(thrMs, 10000);
        if (rem <= beepWin) {
          var sec = Math.ceil(rem / 1000);
          if (rt.lastBeepSec !== sec) {
            rt.lastBeepSec = sec;
            beepTick(1 - rem / beepWin);
          }
        }
      }
      rt.lastRem = rem;
      if (rem <= 0) {
        t.fireCount++;
        fire(t);
        if (t.mode === 'loop') {
          // re-arm from the scheduled end to stay drift-free; if the tab was
          // backgrounded and we're well past zero, restart from now instead
          var end = rt.endTime + t.durationMs;
          if (end <= now) end = now + t.durationMs;
          rt.endTime = end;
          rt.lastRem = end - now; // fresh round: don't misread the jump as a crossing
          rt.lastBeepSec = null;
        } else {
          delete runtime[t.id];
          t.status = 'done';
          t.remainingMs = 0;
        }
        save();
      } else {
        t.remainingMs = rem; // keep fresh so unload-save restores accurately
      }
      updateCard(t);
    });

    // footer "next up" + live countdown in the tab title
    var soonest = null;
    state.timers.forEach(function (t) {
      if (t.status !== 'running' || !runtime[t.id]) return;
      var r = runtime[t.id].endTime - now;
      if (!soonest || r < soonest.rem) soonest = { name: t.name, rem: Math.max(0, r) };
    });
    if (soonest) {
      nextUpEl.hidden = false;
      nextUpEl.textContent = 'next: ' + soonest.name + ' in ' + fmtShort(soonest.rem);
    } else {
      nextUpEl.hidden = true;
    }
    var docT = soonest
      ? fmt(soonest.rem) + ' · ' + (state.settings.boardTitle || 'saywhen')
      : (state.settings.boardTitle ? state.settings.boardTitle + ' · saywhen' : 'saywhen · timers that speak up');
    if (docT !== lastDocTitle) { lastDocTitle = docT; document.title = docT; }
  }, TICK_MS);

  // ---------- header controls ----------

  document.getElementById('addBtn').addEventListener('click', function () {
    var t = makeTimer({
      name: 'Timer ' + (state.timers.length + 1),
      hue: state.timers.length % 6
    });
    state.timers.push(t);
    document.getElementById('timers').appendChild(buildCard(t));
    updateCard(t);
    updateEmpty();
    save();
    // new timers animate in, open ready to configure
    els[t.id].card.classList.add('open', 'enter');
    els[t.id].cfgBtn.textContent = 'settings ▴';
    els[t.id].cfgBtn.setAttribute('aria-expanded', 'true');
    els[t.id].name.focus();
    els[t.id].name.select();
  });

  var allBar = document.getElementById('allBar');
  var startAllBtn = document.getElementById('startAllBtn');
  var pauseAllBtn = document.getElementById('pauseAllBtn');
  var resetAllBtn = document.getElementById('resetAllBtn');

  startAllBtn.addEventListener('click', function () {
    ensureAudio(); // user gesture: unlock audio for the eventual chimes
    state.timers.forEach(function (t) { if (t.status !== 'running') startTimer(t); });
    save();
    state.timers.forEach(updateCard);
  });
  pauseAllBtn.addEventListener('click', function () {
    state.timers.forEach(function (t) { if (t.status === 'running') pauseTimer(t); });
    save();
    state.timers.forEach(updateCard);
  });
  resetAllBtn.addEventListener('click', function () {
    state.timers.forEach(function (t) {
      delete runtime[t.id];
      t.status = 'idle';
      t.remainingMs = t.durationMs;
      t.fireCount = 0;
    });
    save();
    state.timers.forEach(updateCard);
  });

  var menuBtn = document.getElementById('menuBtn');
  var menuPanel = document.getElementById('menuPanel');
  function applyMenu() {
    menuPanel.hidden = !state.settings.menuOpen;
    menuBtn.classList.toggle('active', state.settings.menuOpen);
    menuBtn.setAttribute('aria-expanded', String(state.settings.menuOpen));
  }
  applyMenu();
  menuBtn.addEventListener('click', function () {
    state.settings.menuOpen = !state.settings.menuOpen;
    save();
    applyMenu();
  });

  var boardTitle = document.getElementById('boardTitle');
  function applyBoardTitle() {
    boardTitle.value = state.settings.boardTitle;
    document.title = state.settings.boardTitle
      ? state.settings.boardTitle + ' · saywhen'
      : 'saywhen · timers that speak up';
  }
  applyBoardTitle();
  boardTitle.addEventListener('change', function () {
    state.settings.boardTitle = boardTitle.value.trim().slice(0, 80);
    save();
    applyBoardTitle();
  });

  var rateSlider = document.getElementById('rateSlider');
  var rateValue = document.getElementById('rateValue');
  rateSlider.value = state.settings.rate;
  rateValue.textContent = Number(state.settings.rate).toFixed(1) + '×';
  rateSlider.addEventListener('input', function () {
    state.settings.rate = Number(rateSlider.value);
    rateValue.textContent = state.settings.rate.toFixed(1) + '×';
    save();
  });

  var volSlider = document.getElementById('volSlider');
  var volValue = document.getElementById('volValue');
  volSlider.value = state.settings.volume;
  volValue.textContent = Math.round(state.settings.volume * 100) + '%';
  volSlider.addEventListener('input', function () {
    state.settings.volume = Number(volSlider.value);
    volValue.textContent = Math.round(state.settings.volume * 100) + '%';
    save();
  });

  var chimeToggle = document.getElementById('chimeToggle');
  chimeToggle.checked = state.settings.chime;
  chimeToggle.addEventListener('change', function () {
    state.settings.chime = chimeToggle.checked;
    if (chimeToggle.checked) ensureAudio();
    save();
  });

  document.getElementById('voiceSelect').addEventListener('change', function (e) {
    state.settings.voiceURI = e.target.value;
    save();
  });

  document.getElementById('testBtn').addEventListener('click', function () {
    ensureAudio();
    announce('This is your saywhen voice.');
  });

  if (speechOK) {
    refreshVoices();
    // voices often load asynchronously
    speechSynthesis.addEventListener('voiceschanged', refreshVoices);
  } else {
    document.getElementById('speechWarn').hidden = false;
    document.getElementById('testBtn').disabled = true;
    document.getElementById('voiceSelect').disabled = true;
  }

  // ---------- pop-out (Document Picture-in-Picture: floats above all windows) ----------

  var pipWindow = null;
  var popoutBtn = document.getElementById('popoutBtn');
  var pipNote = document.getElementById('pipNote');

  if (!('documentPictureInPicture' in window)) {
    popoutBtn.hidden = true;
  } else {
    popoutBtn.addEventListener('click', function () {
      if (pipWindow) { pipWindow.close(); return; }
      window.documentPictureInPicture.requestWindow({ width: 460, height: 640 })
        .then(function (win) {
          pipWindow = win;
          win.document.title = 'saywhen';
          // inline styles carry over by copying our single <style> block
          document.querySelectorAll('style').forEach(function (s) {
            var st = win.document.createElement('style');
            st.textContent = s.textContent;
            win.document.head.appendChild(st);
          });
          win.document.body.appendChild(document.querySelector('.wrap'));
          pipNote.hidden = false;
          win.addEventListener('pagehide', function () {
            var wrap = win.document.querySelector('.wrap');
            if (wrap) document.body.insertBefore(wrap, pipNote);
            pipNote.hidden = true;
            var btn = document.getElementById('popoutBtn');
            if (btn) { btn.classList.remove('active'); btn.title = 'Pop out: float above other windows'; }
            pipWindow = null;
          });
          var btn = win.document.getElementById('popoutBtn');
          if (btn) { btn.classList.add('active'); btn.title = 'Pop back into the main window'; }
        })
        .catch(function () {
          // browser refused (embedded context, policy, or no activation)
          popoutBtn.classList.add('blocked');
          popoutBtn.title = 'Pop-out blocked by this browser';
          setTimeout(function () {
            popoutBtn.classList.remove('blocked');
            popoutBtn.title = 'Pop out: float above other windows';
          }, 2000);
        });
    });
    document.getElementById('pipReturn').addEventListener('click', function () {
      if (pipWindow) pipWindow.close();
    });
  }

  // ---------- export / import ----------

  document.getElementById('exportBtn').addEventListener('click', function () {
    var data = JSON.stringify(serialize(), null, 2);
    var blob = new Blob([data], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'saywhen-backup-' + new Date().toISOString().slice(0, 10) + '.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(a.href);
  });

  var importFile = document.getElementById('importFile');
  document.getElementById('importBtn').addEventListener('click', function () {
    importFile.click();
  });
  importFile.addEventListener('change', function () {
    var file = importFile.files && importFile.files[0];
    importFile.value = '';
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      var imported = null;
      try { imported = sanitize(JSON.parse(reader.result)); } catch (e) { /* fallthrough */ }
      if (!imported) {
        alert('That file does not look like a saywhen backup.');
        return;
      }
      if (!confirm('Replace your current timers and settings with this backup?')) return;
      runtime = {};
      state = imported;
      rateSlider.value = state.settings.rate;
      rateValue.textContent = Number(state.settings.rate).toFixed(1) + '×';
      volSlider.value = state.settings.volume;
      volValue.textContent = Math.round(state.settings.volume * 100) + '%';
      chimeToggle.checked = state.settings.chime;
      applyBoardTitle();
      applyMenu();
      refreshVoices();
      renderAll();
      save();
    };
    reader.readAsText(file);
  });

  // ---------- persistence on leave ----------

  addEventListener('pagehide', save);
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'hidden') save();
  });

  // ---------- boot ----------

  renderAll();
})();
</script>
</body>
</html>
